---
# ── ChromaDB — ClusterIP (internal only) ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: travel-assistant
  labels:
    app: chromadb
spec:
  type: ClusterIP
  selector:
    app: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
# ── Backend (FastAPI) — NodePort ──────────────────────────────────────────────
# Exposed externally so Locust (running on the VM) can reach it directly.
# Access: http://<minikube-ip>:30001
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: travel-assistant
  labels:
    app: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30001

---
# ── Gradio UI — NodePort (browser access) ────────────────────────────────────
# Access: http://<minikube-ip>:30000
apiVersion: v1
kind: Service
metadata:
  name: gradio-service
  namespace: travel-assistant
  labels:
    app: gradio
spec:
  type: NodePort
  selector:
    app: gradio
  ports:
    - name: http
      port: 7860
      targetPort: 7860
      nodePort: 30000
