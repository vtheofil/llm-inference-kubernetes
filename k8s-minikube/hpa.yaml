apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: travel-assistant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  # Max 2 replicas on Minikube (single node, 4 vCPU / 16 GB RAM).
  # Each backend pod consumes ~1500m CPU + ~5Gi RAM (backend + ollama sidecar).
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
