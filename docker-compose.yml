# ── Atlas Systems Knowledge Assistant — local development stack ──────────────
#
# Quick start:
#   docker compose up --build
#
# One-time model pull:
#   docker compose run --rm ollama ollama pull phi3:mini

services:

  # ── Ollama ────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── ChromaDB ──────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    restart: unless-stopped

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      DATA_DIR: /app/data
      COLLECTION: enterprise_docs
      LLM_MODEL: phi3:mini
      TOP_K: "5"
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || curl -sf http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    restart: unless-stopped

  # ── Gradio UI ─────────────────────────────────────────────────────────────
  gradio:
    build:
      context: .
      dockerfile: Dockerfile.gradio
    container_name: gradio
    ports:
      - "7860:7860"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data: